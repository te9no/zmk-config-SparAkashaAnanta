name: Build ZMK firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Regex matched against artifact-name, board, shield, and snippet. Use 'all' for every target."
        required: false
        default: "all"
      commit_firmware:
        description: "Commit built firmware files back to this branch."
        required: false
        default: true
        type: boolean
  push:
    paths:
      - config/**
      - boards/**
      - snippets/**
      - build.yaml
      - zephyr/module.yml
      - .github/workflows/build.yml
      - .github/scripts/compose-build-matrix.rb

permissions:
  contents: write
  actions: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: Compose Build Matrix
    outputs:
      matrix: ${{ steps.compose.outputs.matrix }}
      has_targets: ${{ steps.compose.outputs.has_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose matrix from build.yaml
        id: compose
        env:
          TARGET: ${{ inputs.target || 'all' }}
        run: |
          set -euo pipefail
          matrix_json="$(ruby .github/scripts/compose-build-matrix.rb build.yaml "$TARGET")"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"

          count="$(printf '%s' "$matrix_json" | ruby -rjson -e 'print JSON.parse(STDIN.read).fetch("include", []).length')"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected ${count} build target(s)."
          printf '%s' "$matrix_json" | ruby -rjson -e 'JSON.parse(STDIN.read).fetch("include", []).each { |t| puts "- #{t["artifact-name"] || [t["shield"], t["board"]].compact.join("-")}" }'

  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    needs: matrix
    if: needs.matrix.outputs.has_targets == 'true'
    name: Build ${{ matrix['artifact-name'] || matrix.shield || matrix.board }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build directory
        run: echo "build_dir=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Prepare variables
        shell: bash
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
          SNIPPET: ${{ matrix.snippet }}
          ARTIFACT_NAME: ${{ matrix['artifact-name'] }}
        run: |
          set -euo pipefail

          if [ -f zephyr/module.yml ]; then
            base_dir="${TMPDIR:-/tmp}/zmk-config"
            mkdir -p "$base_dir/config"
            cp -R config/* "$base_dir/config/"
            zmk_load_arg="-DZMK_EXTRA_MODULES=${GITHUB_WORKSPACE}"
          else
            base_dir="$GITHUB_WORKSPACE"
            zmk_load_arg=""
          fi

          artifact_name="${ARTIFACT_NAME:-}"
          if [ -z "$artifact_name" ]; then
            artifact_name="${SHIELD:+${SHIELD}-}${BOARD}-zmk"
          fi
          artifact_name="${artifact_name//\//-}"
          display_name="${SHIELD:+${SHIELD} - }${BOARD}"

          echo "base_dir=${base_dir}" >> "$GITHUB_ENV"
          echo "zmk_load_arg=${zmk_load_arg}" >> "$GITHUB_ENV"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_ENV"
          echo "display_name=${display_name}" >> "$GITHUB_ENV"

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ${{ env.base_dir }}/modules/
            ${{ env.base_dir }}/tools/
            ${{ env.base_dir }}/zephyr/
            ${{ env.base_dir }}/bootloader/
            ${{ env.base_dir }}/zmk/
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-

      - name: Cache ccache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ hashFiles('config/west.yml', 'build.yaml', 'config/**/*.conf', 'config/**/*.keymap', 'boards/**/*.conf', 'boards/**/*.overlay', 'boards/**/*.dtsi', 'snippets/**/*.conf', 'snippets/**/*.overlay', 'zephyr/module.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: West init
        working-directory: ${{ env.base_dir }}
        run: west init -l "${{ env.base_dir }}/config"

      - name: West update
        working-directory: ${{ env.base_dir }}
        run: west update --fetch-opt=--filter=tree:0

      - name: West Zephyr export
        working-directory: ${{ env.base_dir }}
        run: west zephyr-export

      - name: Prepare ccache
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.ccache"
          ccache -z || true
          ccache -s || true

      - name: West build (${{ env.display_name }})
        working-directory: ${{ env.base_dir }}
        shell: bash
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
          SNIPPET: ${{ matrix.snippet }}
          CMAKE_ARGS: ${{ matrix['cmake-args'] }}
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
          CCACHE_COMPILERCHECK: content
          CCACHE_IGNOREOPTIONS: --specs=picolibc.specs
        run: |
          set -euo pipefail

          west_args=()
          if [ -n "${SNIPPET:-}" ]; then
            west_args=(-S "$SNIPPET")
          fi

          shield_args=()
          if [ -n "${SHIELD:-}" ]; then
            shield_args=(-DSHIELD="$SHIELD")
          fi

          zmk_load_args=()
          if [ -n "${zmk_load_arg:-}" ]; then
            zmk_load_args=("$zmk_load_arg")
          fi

          # shellcheck disable=SC2086
          west build \
            -s zmk/app \
            -d "$build_dir" \
            -b "$BOARD" \
            "${west_args[@]}" \
            -- \
            -DZMK_CONFIG="$base_dir/config" \
            "${shield_args[@]}" \
            "${zmk_load_args[@]}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            ${CMAKE_ARGS:-}

      - name: ccache statistics
        if: ${{ !cancelled() }}
        run: ccache -s || true

      - name: Kconfig output (${{ env.display_name }})
        if: ${{ !cancelled() }}
        run: |
          if [ -f "${{ env.build_dir }}/zephyr/.config" ]; then
            grep -v -e '^#' -e '^$' "${{ env.build_dir }}/zephyr/.config" | sort
          else
            echo "No Kconfig output"
          fi

      - name: Devicetree output (${{ env.display_name }})
        if: ${{ !cancelled() }}
        run: |
          if [ -f "${{ env.build_dir }}/zephyr/zephyr.dts" ]; then
            cat "${{ env.build_dir }}/zephyr/zephyr.dts"
          elif [ -f "${{ env.build_dir }}/zephyr/zephyr.dts.pre" ]; then
            cat -s "${{ env.build_dir }}/zephyr/zephyr.dts.pre"
          else
            echo "No Devicetree output"
          fi

      - name: Collect firmware
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.build_dir }}/artifacts"
          if [ -f "${{ env.build_dir }}/zephyr/zmk.uf2" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.uf2" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.uf2"
          elif [ -f "${{ env.build_dir }}/zephyr/zmk.bin" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.bin" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.bin"
          else
            echo "No firmware output found" >&2
            exit 1
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ env.artifact_name }}
          path: ${{ env.build_dir }}/artifacts/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch-name
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - name: Prepare firmware directory
        run: |
          mkdir -p "firmware/${{ steps.branch-name.outputs.branch }}"
          rm -rf "firmware/${{ steps.branch-name.outputs.branch }}"/*

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware/${{ steps.branch-name.outputs.branch }}
          pattern: artifact-*

      - name: Flatten firmware artifacts
        run: |
          find "firmware/${{ steps.branch-name.outputs.branch }}" -mindepth 2 -type f -exec mv -t "firmware/${{ steps.branch-name.outputs.branch }}" {} +
          find "firmware/${{ steps.branch-name.outputs.branch }}" -mindepth 1 -type d -empty -delete

      - name: Commit firmware
        if: github.event_name == 'push' || inputs.commit_firmware == true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: firmware/**/*
          commit_message: Update firmware files for branch ${{ steps.branch-name.outputs.branch }}
          commit_options: --no-verify
          push_options: --no-verify

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.branch-name.outputs.branch }}
          path: firmware/${{ steps.branch-name.outputs.branch }}/*
