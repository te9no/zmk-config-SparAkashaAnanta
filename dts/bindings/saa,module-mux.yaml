description: SparAkashaAnanta selected module input path mux

compatible: "saa,module-mux"

properties:
  key-kscan:
    type: phandle
    description: Deferred kscan device used for the direct key module.

  left-encoder:
    type: phandle
    description: Deferred left-side encoder device.

  right-encoder:
    type: phandle
    description: Deferred right-side encoder device.

  joystick-input:
    type: phandle
    description: Deferred analog input device used for the joystick module.

  trackball-input:
    type: phandle
    description: Deferred PMW3610 input device used for the trackball module.

  touchpad-input:
    type: phandle
    description: Deferred touchpad input device used for the TPD module.
