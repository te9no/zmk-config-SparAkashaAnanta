description: Runtime-selected input module kscan proxy

compatible: "zmk,input-module-kscan-proxy"

child-binding:
  description: Kscan route for an input module profile

  properties:
    profile-id:
      type: int
      required: true
      description: Numeric input module profile ID.

    kscan:
      type: phandle
      required: true
      description: Deferred kscan device used when this profile is selected.
